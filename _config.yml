title: "Sigmalgebra"
description: "Financial Engineering & Quantitative Analysis Portfolio"
author: "Sigmalgebra"
url: "https://sigmalgebra.github.io"

# Theme settings
theme: minima
permalink: /blog/:year/:month/:day/:title/

# Social media profiles
social_links:
  github: sigmalgebra
  linkedin: # add your LinkedIn username here

# Custom settings for professional appearance
header_pages:
  - index.md
  - projects.md
  - about.md
  - contact.md

# Google Fonts integration (will be referenced in head.html)
google_fonts: "Montserrat:400,500,600,700|Open+Sans:400,400i,600,700"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude files from being included in the build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md
  - CNAME
