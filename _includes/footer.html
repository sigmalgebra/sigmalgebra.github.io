<footer class="site-footer">
  <div class="wrapper">
    <div class="footer-col-wrapper">
      <div class="footer-col">
        <h2 class="footer-heading">{{ site.title | escape }}</h2>
        <p>{{ site.description | escape }}</p>
      </div>
      
      <div class="footer-col">
        <h2>Connect</h2>
        <ul class="social-media-list">
          {% if site.social_links.github %}
          <li>
            <a href="https://github.com/{{ site.social_links.github }}" target="_blank" title="GitHub">
              <i class="fab fa-github"></i>
            </a>
          </li>
          {% endif %}
          
          {% if site.social_links.linkedin %}
          <li>
            <a href="https://www.linkedin.com/in/{{ site.social_links.linkedin }}" target="_blank" title="LinkedIn">
              <i class="fab fa-linkedin-in"></i>
            </a>
          </li>
          {% endif %}
          
          <li>
            <a href="{{ '/contact' | relative_url }}" title="Contact Me">
              <i class="fas fa-envelope"></i>
            </a>
          </li>
        </ul>
      </div>
    </div>
    
    <div class="footer-bottom">
      <p>&copy; {{ 'now' | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
    </div>
  </div>
</footer>
